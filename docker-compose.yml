services:
  db:
    image: postgres:15-alpine
    container_name: test1_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: counter_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal_app_network

  backend:
    build: ./backend
    container_name: test1_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://root:rootpassword@db:5432/counter_db
    depends_on:
      - db
    networks:
      - internal_app_network

  frontend:
    build: ./frontend
    container_name: test1_frontend
    restart: unless-stopped
    # Eliminamos el "ports: 80:80" de aquí
    depends_on:
      - backend
    networks:
      - internal_app_network
      - proxy_network # <-- Lo conectamos también a la red de NPM

networks:
  internal_app_network:
    driver: bridge
  proxy_network:
    external: true # <-- Le decimos que esta red ya existe (la creamos en el Paso 1)

volumes:
  pgdata:
